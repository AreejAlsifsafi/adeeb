<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>وش تعني؟ | نادي أديب</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--navy:#1b2f4e;--navy2:#274060;--navy3:#335C81;--gold:#c9a84c;--gold2:#e8c97a;--ink:#0f172a;--glass-border:rgba(27,47,78,0.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;min-height:100vh;background:#fff;overflow-x:hidden;color:var(--ink);}
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-canvas::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 10% 10%,rgba(39,64,96,0.18) 0%,transparent 60%),radial-gradient(ellipse 70% 90% at 90% 90%,rgba(201,168,76,0.17) 0%,transparent 60%),#fff;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18;animation:floatOrb 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:var(--navy3);top:-100px;right:-100px;}
.orb2{width:300px;height:300px;background:var(--gold);bottom:-50px;left:-50px;opacity:0.12;animation-delay:3s;}
.orb3{width:200px;height:200px;background:#4a90d9;top:50%;left:50%;opacity:0.15;animation-delay:5s;}
@keyframes floatOrb{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}
.stars{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(27,47,78,0.12) 1px,transparent 1px);background-size:50px 50px;opacity:0.25;}
.page-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
header{padding:20px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);}
.header-logos{display:flex;align-items:center;gap:16px;}
.logo-img{height:48px;object-fit:contain;background:#fff;border-radius:12px;padding:7px 12px;border:1px solid rgba(27,47,78,0.10);}
.logo-sep{width:1px;height:36px;background:var(--glass-border);}
.header-title{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--navy),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:460px;background:rgba(255,255,255,0.82);backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:32px;padding:44px 36px;box-shadow:0 40px 90px rgba(15,23,42,0.12);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.view{display:none;animation:fadeSlide 0.5s ease;}
.view.active{display:block;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--navy2),var(--navy3));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;}
.card-title{text-align:center;font-size:32px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--navy),rgba(27,47,78,0.72));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.card-sub{text-align:center;color:rgba(27,47,78,0.55);font-size:15px;margin-bottom:32px;}
.input-group{position:relative;margin-bottom:16px;}
.input-group i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:rgba(27,47,78,0.45);font-size:18px;pointer-events:none;}
.input-styled{width:100%;padding:16px 52px 16px 20px;background:rgba(27,47,78,0.05);border:1px solid var(--glass-border);border-radius:14px;color:var(--ink);font-family:'Tajawal';font-size:18px;text-align:right;outline:none;transition:all 0.3s;}
.input-styled:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.15);}
.input-styled::placeholder{color:rgba(27,47,78,0.35);}
.btn-primary{width:100%;padding:17px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy);font-family:'Tajawal';font-weight:900;font-size:19px;border:none;border-radius:14px;cursor:pointer;box-shadow:0 8px 24px rgba(201,168,76,0.35);transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,168,76,0.5);}
.wait-anim{text-align:center;padding:20px 0;}
.pulse-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);margin:0 auto 30px;position:relative;display:flex;align-items:center;justify-content:center;font-size:36px;}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);animation:ripple 2s ease-out infinite;}
.pulse-ring::after{animation-delay:1s;}
@keyframes ripple{from{transform:scale(1);opacity:0.8;}to{transform:scale(1.8);opacity:0;}}
.timer-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.timer-circle{width:64px;height:64px;border-radius:50%;background:rgba(201,168,76,0.15);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:var(--gold);}
.timer-circle.urgent{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.15);animation:pulse 0.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.question-label{text-align:center;color:rgba(27,47,78,0.55);font-size:15px;margin-bottom:10px;letter-spacing:1px;}
.word-display{text-align:center;font-size:clamp(48px,12vw,72px);font-weight:900;margin:16px 0 28px;background:linear-gradient(135deg,var(--navy),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;animation:wordIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes wordIn{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
#winner-screen{display:none;position:fixed;inset:0;z-index:9999;background:rgba(255,255,255,0.94);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;backdrop-filter:blur(10px);}
#winner-screen.show{display:flex;}
.trophy-icon{font-size:80px;animation:trophyBounce 0.8s cubic-bezier(0.34,1.56,0.64,1) both;margin-bottom:20px;}
@keyframes trophyBounce{from{opacity:0;transform:scale(0) rotate(-20deg);}to{opacity:1;transform:scale(1) rotate(0);}}
.winner-label{font-size:20px;color:rgba(27,47,78,0.60);margin-bottom:12px;letter-spacing:2px;}
.winner-name-display{font-size:clamp(48px,12vw,80px);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:40px;animation:nameReveal 1s ease 0.5s both;}
@keyframes nameReveal{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.btn-secondary{padding:15px 40px;border-radius:14px;border:2px solid var(--gold);background:transparent;color:var(--gold);font-family:'Tajawal';font-weight:900;font-size:18px;cursor:pointer;transition:all 0.3s;}
.btn-secondary:hover{background:var(--gold);color:var(--navy);}
#toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.92);border:1px solid rgba(201,168,76,0.75);color:var(--navy);padding:12px 28px;border-radius:50px;font-weight:700;font-size:15px;white-space:nowrap;display:none;z-index:9998;backdrop-filter:blur(20px);box-shadow:0 10px 34px rgba(15,23,42,0.18);}
footer{padding:18px 30px;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;gap:12px;}
.social-row{display:flex;gap:20px;align-items:center;}
.social-link{width:40px;height:40px;border-radius:12px;background:rgba(27,47,78,0.04);border:1px solid rgba(27,47,78,0.12);display:flex;align-items:center;justify-content:center;color:rgba(27,47,78,0.70);font-size:16px;text-decoration:none;transition:all 0.3s;}
.social-link:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);transform:translateY(-3px);}
.footer-handle{color:rgba(27,47,78,0.45);font-size:13px;letter-spacing:1px;}
.footer-dev{color:rgba(27,47,78,0.45);font-size:12px;text-decoration:none;}
.footer-dev span{color:var(--gold);font-weight:700;}
@media(max-width:480px){header{padding:14px 18px;}.logo-img{height:38px;}.card{padding:32px 22px;border-radius:24px;}.card-title{font-size:26px;}}
.footer-dev-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.footer-dev-name{color:rgba(27,47,78,0.45);font-size:12px;}
.footer-dev-name span{color:var(--gold);font-weight:700;}
.footer-dev-links{display:flex;gap:14px;align-items:center;}
.footer-dev-link{display:flex;align-items:center;gap:5px;color:rgba(27,47,78,0.55);font-size:11px;text-decoration:none;transition:color 0.3s;}
.footer-dev-link:hover{color:var(--gold);}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="stars"></div>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<div id="toast"></div>
<div id="winner-screen">
  <div class="trophy-icon">🏆</div>
  <div class="winner-label">الفائز بالجولة</div>
  <div id="winner-name-display" class="winner-name-display"></div>
  <button class="btn-secondary" onclick="location.reload()">جولة جديدة →</button>
</div>
<div class="page-wrap">
  <header>
    <div class="header-logos">
      <img src="لوقو الجامعة.png" class="logo-img" alt="KFU">
      <div class="logo-sep"></div>
      <img src="لوقو.png" class="logo-img" alt="Adeeb">
    </div>
    <div class="header-title">وش تعني؟</div>
  </header>
  <main>
    <div class="card">
      <!-- انضمام -->
      <div id="view-join" class="view active">
        <div class="card-icon">✏️</div>
        <div class="card-title">جاهز للتحدي؟</div>
        <div class="card-sub">سجّل اسمك وادخل المسابقة</div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="p-name" class="input-styled" placeholder="اسمك الكريم">
        </div>
        <button class="btn-primary" onclick="joinGame()"><i class="fas fa-bolt"></i> انضمام الآن</button>
      </div>
      <!-- انتظار -->
      <div id="view-wait" class="view">
        <div class="wait-anim">
          <div class="pulse-ring">⏳</div>
          <div class="card-title">جاري التحضير</div>
          <div class="card-sub">خلك مستعد، الجولة بتبدأ قريب!</div>
        </div>
      </div>
      <!-- لعب -->
      <div id="view-play" class="view">
        <div class="timer-wrap"><div class="timer-circle" id="timer">60</div></div>
        <div class="question-label">وش تعني الكلمة</div>
        <div class="word-display" id="active-word">...</div>
        <div class="input-group">
          <i class="fas fa-pen"></i>
          <input type="text" id="p-ans" class="input-styled" placeholder="اكتب إجابتك هنا">
        </div>
        <button class="btn-primary" id="btn-submit" onclick="submitAnswer()">
          <i class="fas fa-paper-plane"></i> إرسال الجواب
        </button>
      </div>
    </div>
  </main>
  <footer>
    <div class="social-row">
      <a class="social-link" href="https://x.com/ab_kfu" target="_blank" aria-label="X">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M18.9 2H22l-6.8 7.8L23 22h-6.2l-4.9-6.4L6.3 22H3.2l7.3-8.3L1 2h6.4l4.4 5.9L18.9 2zm-1.1 18h1.7L7.1 3.9H5.3L17.8 20z"/></svg>
      </a>
      <a class="social-link" href="https://www.instagram.com/ab_kfu/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a class="social-link" href="https://www.youtube.com/@ab_kfu" target="_blank"><i class="fab fa-youtube"></i></a>
      <a class="social-link" href="https://www.tiktok.com/@ab_kfu" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
    <div class="footer-handle">@AB_KFU</div>
    <div class="footer-dev-wrap">
  <span class="footer-dev-name">Developed by <span>Areej Al-Sifsafi</span></span>
  <div class="footer-dev-links">
    <a href="https://x.com/minndree" target="_blank" class="footer-dev-link">
      <svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M18.9 2H22l-6.8 7.8L23 22h-6.2l-4.9-6.4L6.3 22H3.2l7.3-8.3L1 2h6.4l4.4 5.9L18.9 2zm-1.1 18h1.7L7.1 3.9H5.3L17.8 20z"/></svg>
      @minndree
    </a>
    <a href="mailto:areejmerei@gmail.com" class="footer-dev-link">
      <i class="fas fa-envelope"></i>
      areejmerei@gmail.com
    </a>
  </div>
</div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ghpftlnmklfovuuqxbyz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocGZ0bG5ta2xmb3Z1dXF4Ynl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTk1NzMsImV4cCI6MjA5MjA5NTU3M30.1BKbhwHhlX-Y2IQxgGpVYZnlB7Ndp-KHNbMHhR9V_AI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myPlayerId = null;      // id في adeeb_game_players
let myName = '';
let currentQId = null;
let submittedForRound = false;
let timerInt = null;
let lastRoundActive = false;
let lastQId = null;

function toast(msg, dur=3000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.display='none';},dur);
}
function showView(name){
  ['join','wait','play'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el) el.classList.toggle('active',v===name);
  });
}

// ===== انضمام =====
async function joinGame(){
  const name=document.getElementById('p-name').value.trim();
  if(!name) return toast('✋ سجّل اسمك أولاً!');
  myName=name;
  try{
    // أضف اللاعب إلى adeeb_game_players
    const {data,error}=await sb.from('adeeb_game_players').insert({name:myName}).select('id').single();
    if(error) throw error;
    myPlayerId=data.id;
    showView('wait');
    toast('✅ تم تسجيلك، انتظر بدء الجولة');
    await checkState();
  }catch(e){
    console.error(e);
    toast('⚠️ خطأ في التسجيل: '+(e.message||''));
  }
}

// ===== فحص الحالة =====
async function checkState(){
  if(!myPlayerId) return;
  try{
    const {data:state,error}=await sb.from('adeeb_game_state').select('*').eq('id',1).single();
    if(error||!state) return;
    await handleState(state);
  }catch(e){console.error(e);}
}

async function handleState(state){
  const isActive=!!state.round_active;
  const qId=state.current_question_id!==null&&state.current_question_id!==undefined?Number(state.current_question_id):null;

  // فائز
  if(state.winner_player_id){
    try{
      const {data:p}=await sb.from('adeeb_game_players').select('name').eq('id',state.winner_player_id).single();
      if(p?.name) showWinner(p.name);
    }catch{}
    return;
  }

  if(isActive && qId!==null){
    if(!lastRoundActive || qId!==lastQId){
      // جولة جديدة
      submittedForRound=false;
      await startRound(qId);
    }
  } else if(!isActive && lastRoundActive){
    showView('wait');
    toast('🛑 انتهت الجولة');
    clearInterval(timerInt);
  }

  lastRoundActive=isActive;
  lastQId=qId;
}

async function startRound(questionId){
  currentQId=questionId;
  // جلب الكلمة
  try{
    const {data:q}=await sb.from('adeeb_game_questions').select('word').eq('id',questionId).single();
    document.getElementById('active-word').textContent=q?.word??'...';
  }catch(e){
    document.getElementById('active-word').textContent='...';
  }
  document.getElementById('p-ans').value='';
  document.getElementById('p-ans').disabled=false;
  document.getElementById('btn-submit').style.display='flex';
  showView('play');
  startTimer(60);
}

function startTimer(sec){
  clearInterval(timerInt);
  const el=document.getElementById('timer');
  el.textContent=sec; el.className='timer-circle';
  timerInt=setInterval(()=>{
    sec--;
    el.textContent=sec;
    if(sec<=10) el.className='timer-circle urgent';
    if(sec<=0) clearInterval(timerInt);
  },1000);
}

async function submitAnswer(){
  const ans=document.getElementById('p-ans').value.trim();
  if(!ans) return toast('✋ اكتب إجابتك أولاً!');
  if(!lastRoundActive||currentQId===null) return toast('⚠️ الجولة غير نشطة');
  if(submittedForRound) return toast('ℹ️ تم إرسال إجابتك مسبقًا');
  if(!myPlayerId) return toast('⚠️ لم يتم تسجيلك بعد');

  document.getElementById('p-ans').disabled=true;
  document.getElementById('btn-submit').style.display='none';
  try{
    submittedForRound=true;
    const {error}=await sb.from('adeeb_game_submissions').insert({
      player_id: myPlayerId,
      question_id: currentQId,
      answer: ans
    });
    if(error) throw error;
    toast('✅ تم إرسال جوابك! انتظر النتيجة');
  }catch(e){
    console.error(e);
    submittedForRound=false;
    document.getElementById('p-ans').disabled=false;
    document.getElementById('btn-submit').style.display='flex';
    toast('⚠️ خطأ في الإرسال: '+(e.message||''));
  }
}

function showWinner(name){
  document.getElementById('winner-name-display').textContent=name||'—';
  document.getElementById('winner-screen').classList.add('show');
  confetti({particleCount:200,spread:80,origin:{y:0.6},colors:['#c9a84c','#e8c97a','#fff']});
  setTimeout(()=>confetti({particleCount:100,spread:60,origin:{y:0.6},angle:60}),600);
  setTimeout(()=>confetti({particleCount:100,spread:60,origin:{y:0.6},angle:120}),900);
}

// ===== ريل تايم =====
sb.channel('player-state-watch')
  .on('postgres_changes',{event:'UPDATE',schema:'public',table:'adeeb_game_state'},async payload=>{
    if(!myPlayerId) return;
    await handleState(payload.new);
  }).subscribe();

// Polling كـ fallback
setInterval(checkState, 3000);
</script>
</body>
</html>
