<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>وش تعني؟ | نادي أديب</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --navy: #1b2f4e;
  --navy2: #274060;
  --navy3: #335C81;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --ink: #0f172a;
  --muted: rgba(15, 23, 42, 0.65);
  --white: #ffffff;
  --glass: rgba(27, 47, 78, 0.05);
  --glass-strong: rgba(27, 47, 78, 0.08);
  --glass-border: rgba(27, 47, 78, 0.12);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Eras Demi ITC','Tajawal',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background: #ffffff;
  overflow-x:hidden;
  color:var(--ink);
}
:lang(ar) body, body[dir="rtl"]{
  font-family:'Lyon Arabic Display Black','Tajawal',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
}

/* ===== ANIMATED BG ===== */
.bg-canvas {
  position:fixed;inset:0;z-index:0;overflow:hidden;
}
.bg-canvas::before {
  content:'';position:absolute;inset:0;
  background: radial-gradient(ellipse 90% 70% at 10% 10%, rgba(39,64,96,0.18) 0%, transparent 60%),
              radial-gradient(ellipse 70% 90% at 90% 90%, rgba(201,168,76,0.17) 0%, transparent 60%),
              radial-gradient(ellipse 60% 60% at 55% 40%, rgba(51,92,129,0.12) 0%, transparent 70%),
              #ffffff;
  animation: bgShift 12s ease-in-out infinite alternate;
}
@keyframes bgShift {
  from{background-position:0% 0%;}
  to{background-position:100% 100%;}
}

/* Floating orbs */
.orb {
  position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18;animation:floatOrb 8s ease-in-out infinite;
}
.orb1{width:400px;height:400px;background:var(--navy3);top:-100px;right:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:var(--gold);bottom:-50px;left:-50px;opacity:0.12;animation-delay:3s;}
.orb3{width:200px;height:200px;background:#4a90d9;top:50%;left:50%;opacity:0.15;animation-delay:5s;}
@keyframes floatOrb{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}

/* Stars pattern */
.stars {
  position:absolute;inset:0;
  background-image: radial-gradient(circle, rgba(27,47,78,0.12) 1px, transparent 1px);
  background-size:50px 50px;
  opacity:0.25;
}

/* ===== LAYOUT ===== */
.page-wrap {
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
}

/* ===== HEADER ===== */
header {
  padding:20px 30px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
}
.header-logos {
  display:flex;align-items:center;gap:16px;
}
.logo-img {
  height:48px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  transition:transform 0.3s;
  background:#fff;
  border-radius:12px;
  padding:7px 12px;
  border:1px solid rgba(27,47,78,0.10);
}
.logo-img:hover{transform:scale(1.05);}
.logo-sep {
  width:1px;height:36px;background:var(--glass-border);
}
.header-title {
  font-size:18px;font-weight:900;
  background:linear-gradient(135deg,var(--navy),var(--gold));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:1px;
}

/* ===== MAIN ===== */
main {
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* ===== CARD ===== */
.card {
  width:100%;max-width:460px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(30px);
  border:1px solid var(--glass-border);
  border-radius:32px;
  padding:44px 36px;
  box-shadow: 0 40px 90px rgba(15,23,42,0.12), inset 0 1px 0 rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ===== VIEWS ===== */
.view { display:none; animation:fadeSlide 0.5s ease; }
.view.active { display:block; }
@keyframes fadeSlide {
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* Join View */
.card-icon {
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--navy2),var(--navy3));
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  border:1px solid rgba(27,47,78,0.14);
  box-shadow:0 14px 34px rgba(27,47,78,0.18);
  font-size:32px;
}
.card-title {
  text-align:center;font-size:32px;font-weight:900;
  margin-bottom:8px;
  background:linear-gradient(135deg,var(--navy),rgba(27,47,78,0.72));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.card-sub {
  text-align:center;color:rgba(27,47,78,0.55);font-size:15px;margin-bottom:32px;
}

.input-group {
  position:relative;margin-bottom:16px;
}
.input-group i {
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  color:rgba(27,47,78,0.45);font-size:18px;pointer-events:none;
}
.input-styled {
  width:100%;padding:16px 52px 16px 20px;
  background:rgba(27,47,78,0.05);
  border:1px solid var(--glass-border);
  border-radius:14px;
  color:var(--ink);font-family:'Tajawal';font-size:18px;
  text-align:right;outline:none;
  transition:all 0.3s;
}
.input-styled:focus {
  border-color:var(--gold);
  background:rgba(27,47,78,0.06);
  box-shadow:0 0 0 3px rgba(201,168,76,0.15);
}
.input-styled::placeholder{color:rgba(27,47,78,0.35);}

.btn-primary {
  width:100%;padding:17px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--navy);font-family:'Tajawal';font-weight:900;font-size:19px;
  border:none;border-radius:14px;cursor:pointer;
  box-shadow:0 8px 24px rgba(201,168,76,0.35);
  transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-primary:hover {
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(201,168,76,0.5);
}
.btn-primary:active{transform:translateY(0);}

/* Wait View */
.wait-anim {
  text-align:center;padding:20px 0;
}
.pulse-ring {
  width:100px;height:100px;
  border-radius:50%;
  border:3px solid var(--gold);
  margin:0 auto 30px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
}
.pulse-ring::before,.pulse-ring::after {
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--gold);
  animation:ripple 2s ease-out infinite;
}
.pulse-ring::after{animation-delay:1s;}
@keyframes ripple {
  from{transform:scale(1);opacity:0.8;}
  to{transform:scale(1.8);opacity:0;}
}

/* Play View */
.timer-wrap {
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
}
.timer-circle {
  width:64px;height:64px;border-radius:50%;
  background:rgba(201,168,76,0.15);
  border:3px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:var(--gold);
}
.timer-circle.urgent {
  border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.15);
  animation:pulse 0.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

.question-label {
  text-align:center;color:rgba(27,47,78,0.55);font-size:15px;margin-bottom:10px;
  letter-spacing:1px;text-transform:uppercase;
}
.word-display {
  text-align:center;
  font-size:clamp(48px,12vw,72px);font-weight:900;
  margin:16px 0 28px;
  background:linear-gradient(135deg,var(--navy),var(--gold));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1.1;
  animation:wordIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes wordIn {
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;transform:scale(1);}
}

/* ===== WINNER OVERLAY ===== */
#winner-screen {
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(255,255,255,0.94);
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px;
  backdrop-filter:blur(10px);
}
#winner-screen.show{display:flex;}

.trophy-icon {
  font-size:80px;
  animation:trophyBounce 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  margin-bottom:20px;
}
@keyframes trophyBounce {
  from{opacity:0;transform:scale(0) rotate(-20deg);}
  to{opacity:1;transform:scale(1) rotate(0);}
}
.winner-label {
  font-size:20px;color:rgba(27,47,78,0.60);margin-bottom:12px;letter-spacing:2px;
}
.winner-name {
  font-size:clamp(48px,12vw,80px);font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:40px;animation:nameReveal 1s ease 0.5s both;
}
@keyframes nameReveal {
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
.btn-secondary {
  padding:15px 40px;border-radius:14px;border:2px solid var(--gold);
  background:transparent;color:var(--gold);font-family:'Tajawal';
  font-weight:900;font-size:18px;cursor:pointer;
  transition:all 0.3s;
}
.btn-secondary:hover{background:var(--gold);color:var(--navy);}

/* ===== TOAST ===== */
#toast {
  position:fixed;top:90px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(201,168,76,0.75);
  color:var(--navy);padding:12px 28px;
  border-radius:50px;font-weight:700;font-size:15px;
  white-space:nowrap;display:none;z-index:9998;
  backdrop-filter:blur(20px);
  box-shadow:0 10px 34px rgba(15,23,42,0.18);
  animation:toastIn 0.3s ease;
}
@keyframes toastIn {
  from{opacity:0;transform:translateX(-50%) translateY(-10px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}

/* ===== FOOTER ===== */
footer {
  padding:18px 30px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.social-row {
  display:flex;gap:20px;align-items:center;
}
.social-link {
  width:40px;height:40px;border-radius:12px;
  background:rgba(27,47,78,0.04);
  border:1px solid rgba(27,47,78,0.12);
  display:flex;align-items:center;justify-content:center;
  color:rgba(27,47,78,0.70);font-size:16px;
  text-decoration:none;transition:all 0.3s;
}
.social-link:hover {
  background:var(--gold);color:var(--navy);border-color:var(--gold);
  transform:translateY(-3px);
}
.footer-handle {
  color:rgba(27,47,78,0.45);font-size:13px;letter-spacing:1px;
}
.footer-dev {
  color:rgba(27,47,78,0.45);font-size:12px;text-decoration:none;
  transition:color 0.3s;
}
.footer-dev span{color:var(--gold);font-weight:700;}
.footer-dev:hover{color:rgba(27,47,78,0.75);}

/* Responsive */
@media(max-width:480px) {
  header{padding:14px 18px;}
  .logo-img{height:38px;}
  .card{padding:32px 22px;border-radius:24px;}
  .card-title{font-size:26px;}
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-canvas">
  <div class="stars"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- WINNER -->
<div id="winner-screen">
  <div class="trophy-icon">🏆</div>
  <div class="winner-label">الفائز بالجولة</div>
  <div id="winner-name" class="winner-name"></div>
  <button class="btn-secondary" onclick="location.reload()">جولة جديدة →</button>
</div>

<div class="page-wrap">

  <!-- HEADER -->
  <header>
    <div class="header-logos">
      <img src="لوقو الجامعة.png" class="logo-img" alt="KFU">
      <div class="logo-sep"></div>
      <img src="لوقو.png" class="logo-img" alt="Adeeb">
    </div>
    <div class="header-title">وش تعني؟</div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="card">

      <!-- JOIN -->
      <div id="view-join" class="view active">
        <div class="card-icon">✏️</div>
        <div class="card-title">جاهز للتحدي؟</div>
        <div class="card-sub">سجّل اسمك وادخل المسابقة</div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="p-name" class="input-styled" placeholder="اسمك الكريم">
        </div>
        <button class="btn-primary" onclick="joinGame()">
          <i class="fas fa-bolt"></i> انضمام الآن
        </button>
      </div>

      <!-- WAIT -->
      <div id="view-wait" class="view">
        <div class="wait-anim">
          <div class="pulse-ring">⏳</div>
          <div class="card-title">جاري التحضير</div>
          <div class="card-sub">خلك مستعد، الجولة بتبدأ قريب!</div>
        </div>
      </div>

      <!-- PLAY -->
      <div id="view-play" class="view">
        <div class="timer-wrap">
          <div class="timer-circle" id="timer">15</div>
        </div>
        <div class="question-label">وش تعني الكلمة</div>
        <div class="word-display" id="active-word">...</div>
        <div class="input-group">
          <i class="fas fa-pen"></i>
          <input type="text" id="p-ans" class="input-styled" placeholder="اكتب إجابتك هنا">
        </div>
        <button class="btn-primary" id="btn-submit" onclick="submitAnswer()">
          <i class="fas fa-paper-plane"></i> إرسال الجواب
        </button>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="social-row">
      <a class="social-link" href="https://x.com/ab_kfu" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a class="social-link" href="https://www.instagram.com/ab_kfu/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a class="social-link" href="https://www.youtube.com/@ab_kfu" target="_blank"><i class="fab fa-youtube"></i></a>
      <a class="social-link" href="https://www.tiktok.com/@ab_kfu" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
    <div class="footer-handle">@AB_KFU</div>
    <a href="https://x.com/minndree" target="_blank" class="footer-dev">
      Developed by <span>Areej Al-Sifsafi @minndree</span>
    </a>
  </footer>

</div>

<script>
// ===== Local Multiplayer (بدون قاعدة بيانات) =====
// يعمل بين صفحات نفس الموقع (Live Server) عبر BroadcastChannel.
const bc = new BroadcastChannel('adeeb_game_v1');

const WORDS = [
  { word: 'هَبشه' },
  { word: 'زتت' },
  { word: 'غَمِيضه' },
  { word: 'مَابَرَح' },
  { word: 'هبابك' },
  { word: 'ادن' },
  { word: 'غلق' },
  { word: 'مقاقه' },
  { word: 'ايزيت' },
  { word: 'سحه' },
  { word: 'نوبه' },
  { word: 'خرمس' },
  { word: 'انثبر' },
  { word: 'ابخص' },
  { word: 'زاهب' },
  { word: 'مدحدر' },
  { word: 'هبده' },
  { word: 'يتنوى' },
  { word: 'امبلا' },
  { word: 'البارحه' },
  { word: 'منطول' },
  { word: 'عفيسه' },
  { word: 'اظهر' },
  { word: 'مطيور' },
  { word: 'بند' },
  { word: 'جعونيه' },
  { word: 'بانكه' },
  { word: 'دريشه' },
  { word: 'كنبل' },
  { word: 'كبت' },
  { word: 'الحوي' },
  { word: 'الجَابْلَه' },
  { word: 'اللَّابْلَه' },
  { word: 'غلج' },
  { word: 'هَالْحزْة' },
  { word: 'برَدْه' },
  { word: 'مصرقع' },
];

let myId = crypto.randomUUID();
let myName = '';
let currentWordIndex = null;
let roundActive = false;
let submittedForRound = false;
let timerInt = null;

function toast(msg, dur = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.display = 'none';
  }, dur);
}

function showView(name) {
  const views = ['join', 'wait', 'play'];
  for (const v of views) {
    const el = document.getElementById(`view-${v}`);
    if (!el) continue;
    el.classList.toggle('active', v === name);
  }
}

function startRoundLocal(wordIndex) {
  currentWordIndex = Number(wordIndex);
  roundActive = true;
  submittedForRound = false;

  const w = WORDS[currentWordIndex]?.word ?? '...';
  document.getElementById('active-word').textContent = w;
  const ansEl = document.getElementById('p-ans');
  ansEl.value = '';
  ansEl.disabled = false;
  document.getElementById('btn-submit').style.display = 'flex';
  showView('play');
  startTimer(15);
}

async function joinGame() {
  const name = document.getElementById('p-name').value.trim();
  if(!name) return toast('✋ سجّل اسمك أولاً!');
  
  try {
    myName = name;
    showView('wait');

    // announce join
    bc.postMessage({ type:'JOIN', playerId: myId, name: myName });
    // request state (admin will reply if open)
    bc.postMessage({ type:'REQUEST_STATE', playerId: myId });

    toast('✅ تم تسجيلك، انتظر بدء الجولة');
  } catch(e) {
    toast('⚠️ خطأ في الاتصال، تحقق من البيانات');
    console.error(e);
  }
}

function startTimer(sec) {
  clearInterval(timerInt);
  const el = document.getElementById('timer');
  el.textContent = sec;
  el.className = 'timer-circle';
  timerInt = setInterval(()=>{
    sec--;
    el.textContent = sec;
    if(sec<=5) el.className = 'timer-circle urgent';
    if(sec<=0) clearInterval(timerInt);
  }, 1000);
}

async function submitAnswer() {
  const ans = document.getElementById('p-ans').value.trim();
  if(!ans) return toast('✋ اكتب إجابتك أولاً!');
  if (!roundActive || currentWordIndex === null) return toast('⚠️ الجولة غير نشطة');
  if (submittedForRound) return toast('ℹ️ تم إرسال إجابتك مسبقًا');

  document.getElementById('p-ans').disabled = true;
  document.getElementById('btn-submit').style.display = 'none';
  try {
    submittedForRound = true;
    bc.postMessage({
      type:'SUBMIT',
      playerId: myId,
      name: myName,
      wordIndex: currentWordIndex,
      answer: ans,
      createdAt: Date.now()
    });
    toast('✅ تم إرسال جوابك! انتظر النتيجة');
  } catch(e) { console.error(e); toast('⚠️ خطأ في الإرسال'); }
}

function showWinnerByName(name) {
  document.getElementById('winner-name').textContent = name || '—';
  document.getElementById('winner-screen').classList.add('show');
  confetti({ particleCount:200, spread:80, origin:{ y:0.6 }, colors:['#c9a84c','#e8c97a','#ffffff'] });
  setTimeout(()=> confetti({ particleCount:100, spread:60, origin:{ y:0.6 }, angle:60 }), 600);
  setTimeout(()=> confetti({ particleCount:100, spread:60, origin:{ y:0.6 }, angle:120 }), 900);
}

bc.onmessage = (ev) => {
  const msg = ev.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'STATE') {
    roundActive = !!msg.roundActive;
    currentWordIndex = msg.wordIndex ?? null;
    if (roundActive && currentWordIndex !== null) {
      startRoundLocal(currentWordIndex);
    } else {
      showView('wait');
    }
  }

  if (msg.type === 'WINNER') {
    roundActive = false;
    showWinnerByName(msg.name);
  }

  if (msg.type === 'ROUND_STOPPED') {
    roundActive = false;
    showView('wait');
    toast('🛑 انتهت الجولة');
  }
};
</script>
</body>
</html>
