<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>وش تعني؟ | نادي أديب</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --navy:#1b2f4e;--navy2:#274060;--navy3:#335C81;
  --gold:#c9a84c;--gold2:#e8c97a;--ink:#0f172a;
  --green:#22c55e;--red:#ef4444;
  --glass-border:rgba(27,47,78,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Tajawal',sans-serif;
  min-height:100vh;background:#fff;
  color:var(--ink);overflow-x:hidden;
}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 70% at 10% 10%,rgba(39,64,96,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 70% 90% at 90% 90%,rgba(201,168,76,0.13) 0%,transparent 60%),
    #fff;
}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:floatOrb 8s ease-in-out infinite;}
.orb1{width:350px;height:350px;background:var(--navy3);top:-80px;right:-80px;}
.orb2{width:250px;height:250px;background:var(--gold);bottom:-40px;left:-40px;opacity:0.10;animation-delay:3s;}
@keyframes floatOrb{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
.stars{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(27,47,78,0.10) 1px,transparent 1px);background-size:48px 48px;opacity:0.2;}

/* LAYOUT */
.page-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{
  padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,0.80);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;z-index:100;
}
.header-logos{display:flex;align-items:center;gap:12px;}
.logo-img{height:42px;object-fit:contain;background:#fff;border-radius:10px;padding:5px 10px;border:1px solid rgba(27,47,78,0.10);}
.logo-sep{width:1px;height:30px;background:var(--glass-border);}
.header-title{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--navy),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}

/* SCREENS */
.screen{display:none;width:100%;max-width:500px;animation:fadeUp .4s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* CARD */
.card{
  background:rgba(255,255,255,0.85);backdrop-filter:blur(30px);
  border:1px solid var(--glass-border);border-radius:28px;
  padding:40px 32px;
  box-shadow:0 30px 80px rgba(15,23,42,0.10);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* JOIN SCREEN */
.card-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--navy2),var(--navy3));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:30px;}
.card-title{text-align:center;font-size:28px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--navy),rgba(27,47,78,0.72));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.card-sub{text-align:center;color:rgba(27,47,78,0.55);font-size:14px;margin-bottom:28px;}
.input-wrap{position:relative;margin-bottom:16px;}
.input-wrap i{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(27,47,78,0.4);font-size:17px;pointer-events:none;}
.inp{
  width:100%;padding:15px 48px 15px 18px;
  background:rgba(27,47,78,0.05);border:1px solid var(--glass-border);
  border-radius:13px;color:var(--ink);font-family:'Tajawal';font-size:17px;
  text-align:right;outline:none;transition:all .3s;
}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.15);}
.inp::placeholder{color:rgba(27,47,78,0.35);}
.btn-gold{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--navy);font-family:'Tajawal';font-weight:900;font-size:18px;
  border:none;border-radius:13px;cursor:pointer;
  box-shadow:0 8px 24px rgba(201,168,76,0.30);
  transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,168,76,0.45);}
.btn-gold:active{transform:translateY(0);}

/* QUIZ SCREEN */
.quiz-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.progress-info{font-size:13px;color:rgba(27,47,78,0.55);font-weight:700;}
.progress-bar-wrap{background:rgba(27,47,78,0.08);border-radius:99px;height:6px;margin-bottom:22px;overflow:hidden;}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s ease;}
.timer-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);
  padding:6px 14px;border-radius:99px;
  font-size:15px;font-weight:900;color:var(--navy);
}
.timer-badge.urgent{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:var(--red);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

.question-word{
  text-align:center;
  font-size:clamp(40px,10vw,62px);font-weight:900;
  margin:10px 0 28px;
  background:linear-gradient(135deg,var(--navy),var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.1;
  animation:wordPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes wordPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.choice{
  padding:18px 14px;
  background:rgba(255,255,255,0.9);
  border:2px solid var(--glass-border);
  border-radius:16px;text-align:center;
  font-family:'Tajawal';font-size:16px;font-weight:700;
  color:var(--navy);cursor:pointer;
  transition:all .25s;
  box-shadow:0 4px 14px rgba(15,23,42,0.06);
}
.choice:hover:not(.disabled){
  border-color:var(--gold);
  background:rgba(201,168,76,0.08);
  transform:translateY(-2px);
}
.choice.correct{
  background:rgba(34,197,94,0.12);
  border-color:var(--green);color:#166534;
  animation:correctPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes correctPop{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}
.choice.wrong{background:rgba(239,68,68,0.10);border-color:var(--red);color:#991b1b;}
.choice.disabled{cursor:not-allowed;pointer-events:none;}

/* LOADING */
.loading-wrap{text-align:center;padding:40px 0;}
.spinner{width:50px;height:50px;border:4px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LEADERBOARD */
.lb-title{
  text-align:center;font-size:26px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,var(--navy),var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.lb-sub{text-align:center;color:rgba(27,47,78,0.50);font-size:13px;margin-bottom:24px;}
/* LEADERBOARD TABLE */
.lb-table{width:100%;border-collapse:collapse;margin-top:4px;}
.lb-table thead tr{background:linear-gradient(135deg,var(--navy2),var(--navy3));}
.lb-table thead th{padding:11px 10px;color:#fff;font-size:13px;font-weight:900;letter-spacing:.5px;}
.lb-table thead th:first-child{border-radius:12px 0 0 0;text-align:center;width:52px;}
.lb-table thead th:last-child{border-radius:0 12px 0 0;text-align:center;}
.lb-table thead th:nth-child(3),.lb-table thead th:nth-child(4){text-align:center;}
.lb-table tbody tr{border-bottom:1px solid rgba(27,47,78,0.07);transition:background .2s;animation:lbIn .35s ease both;}
.lb-table tbody tr:nth-child(1){animation-delay:.04s;}
.lb-table tbody tr:nth-child(2){animation-delay:.08s;}
.lb-table tbody tr:nth-child(3){animation-delay:.12s;}
.lb-table tbody tr:nth-child(4){animation-delay:.16s;}
.lb-table tbody tr:nth-child(5){animation-delay:.20s;}
.lb-table tbody tr:hover{background:rgba(27,47,78,0.03);}
@keyframes lbIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.lb-table tbody td{padding:11px 10px;font-size:14px;color:var(--navy);}
.lb-table tbody td:first-child{text-align:center;font-weight:900;}
.lb-table tbody td:nth-child(3){text-align:center;font-weight:900;}
.lb-table tbody td:nth-child(4){text-align:center;color:rgba(27,47,78,0.6);}
.row-top1{background:rgba(255,215,0,.10)!important;}
.row-top2{background:rgba(192,192,192,.10)!important;}
.row-top3{background:rgba(205,127,50,.10)!important;}
.row-me{background:rgba(201,168,76,.10)!important;outline:2px solid rgba(201,168,76,.4);}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;font-size:14px;background:rgba(27,47,78,0.07);}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA500);}
.rank-2{background:linear-gradient(135deg,#C0C0C0,#A8A8A8);}
.rank-3{background:linear-gradient(135deg,#CD7F32,#A0522D);}
.lb-scroll{max-height:400px;overflow-y:auto;border-radius:0 0 12px 12px;border:1px solid var(--glass-border);border-top:none;}

.btn-outline{
  width:100%;padding:14px;margin-top:16px;
  border:2px solid var(--gold);background:transparent;
  color:var(--gold);font-family:'Tajawal';font-weight:900;font-size:16px;
  border-radius:13px;cursor:pointer;transition:all .3s;
}
.btn-outline:hover{background:var(--gold);color:var(--navy);}

/* RESULT badge on quiz */
.result-msg{
  text-align:center;margin-top:18px;
  font-size:15px;font-weight:700;color:rgba(27,47,78,0.6);
}

/* FOOTER */
footer{
  padding:14px 24px;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.social-row{display:flex;gap:14px;}
.social-link{
  width:36px;height:36px;border-radius:10px;
  background:rgba(27,47,78,0.04);border:1px solid rgba(27,47,78,0.12);
  display:flex;align-items:center;justify-content:center;
  color:rgba(27,47,78,0.65);font-size:14px;text-decoration:none;transition:all .3s;
}
.social-link:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);transform:translateY(-2px);}
.footer-handle{color:rgba(27,47,78,0.45);font-size:12px;letter-spacing:1px;}
.footer-dev-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
.footer-dev-name{color:rgba(27,47,78,0.45);font-size:11px;}
.footer-dev-name span{color:var(--gold);font-weight:700;}
.footer-dev-links{display:flex;gap:12px;align-items:center;}
.footer-dev-link{display:flex;align-items:center;gap:4px;color:rgba(27,47,78,0.50);font-size:11px;text-decoration:none;transition:color .3s;}
.footer-dev-link:hover{color:var(--gold);}

/* TOAST */
#toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.92);border:1px solid rgba(201,168,76,0.75);
  color:var(--navy);padding:10px 24px;border-radius:40px;
  font-weight:700;font-size:14px;white-space:nowrap;
  display:none;z-index:9999;backdrop-filter:blur(20px);
  box-shadow:0 10px 30px rgba(15,23,42,0.15);
}

@media(max-width:480px){
  header{padding:12px 16px;}.logo-img{height:36px;}
  .card{padding:28px 18px;border-radius:22px;}
  .choices{grid-template-columns:1fr 1fr;}
  .choice{padding:14px 10px;font-size:14px;}
}

.session-hint{text-align:center;font-size:12px;color:rgba(27,47,78,0.45);margin:-8px 0 14px;letter-spacing:.3px;}
</style>
</head>

  {word:'عفيسه',   choices:['المكان الواسع','الغرفه الباردة','الزاوية الضيقة','المكان غير المرتب'], correct:3},
  {word:'اظهر',    choices:['اختفي','ارجع','استأذن','اخرج'],        correct:3},
  {word:'مطيور',   choices:['متوتر','متأخر','مستعجل','هادئ'],       correct:2},
  {word:'بند',     choices:['فتح','قفل','بدأ','نام'],               correct:1},
  {word:'جعونيه',  choices:['سحليه','ضفدع','سلحفاة','بطة'],        correct:1},
  {word:'بانكه',   choices:['ثلاجه','لمبه','نافذة','مروحة'],        correct:3},
  {word:'دريشه',   choices:['باب','سطح','نافذة','ستارة'],           correct:2},
  {word:'كنبل',    choices:['كنب','بطانية','سجادة','مخدة'],         correct:1},
  {word:'كبت',     choices:['درج','دولاب','كتاب','رف'],             correct:1},
  {word:'الحوي',   choices:['المكان الفارغ','السطح','الحوش','المجلس'], correct:2},
  {word:'الجَابْله',choices:['مقابله','غداً ليلاً','اخر الليل','بعد العصر'], correct:1},
  {word:'اللَّابْله',choices:['لا مبالاه','الليلة','المغرب','بعد غدٍ ليلاً'], correct:3},
  {word:'غلج',     choices:['صعب','ضيق','سهل','طويل'],              correct:0},
  {word:'هَالْحزْة',choices:['امس','في هذا الوقت','قبل فترة','بعد قليل'], correct:1},
  {word:'برَدْه',  choices:['برد','بسرعة','بخفة','مر واحدة'],       correct:3},
  {word:'مصرقع',   choices:['صاعقه','مرتبك','غير متزن','ذكي'],      correct:2},
];

// ===== STATE =====
let playerName  = '';
let sessionCode = '';
let currentQ    = 0;
let score       = 0;
let startTime   = 0;
let qStartTime  = 0;
let totalMs     = 0;
let answered    = false;
let timerInt    = null;
let timerSec    = 15;

// ===== HELPERS =====
function toast(msg, dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.display='none';},dur);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ===== START =====
async function startQuiz(){
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('session-code').value.trim();
  if(!name) return toast('✋ سجّل اسمك أولاً!');
  if(!code) return toast('📌 أدخل كود الجلسة!');

  // تحقق من الكود في سوبابيس
  const btn = document.querySelector('.btn-gold');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
  try{
    const {data, error} = await sb.from('adeeb_sessions')
      .select('code')
      .eq('code', code.toUpperCase())
      .single();
    if(error || !data){
      toast('❌ كود غلط! تأكد من الكود وحاول مرة ثانية');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-bolt"></i> ابدأ الاختبار';
      return;
    }
  } catch(e){
    toast('❌ كود غلط! تأكد من الكود');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-bolt"></i> ابدأ الاختبار';
    return;
  }

  playerName  = name;
  sessionCode = code.toUpperCase();
  currentQ   = 0;
  score      = 0;
  totalMs    = 0;
  startTime  = Date.now();
  showScreen('quiz');
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion(){
  const q = QUESTIONS[currentQ];
  answered = false;

  document.getElementById('q-num').textContent   = currentQ + 1;
  document.getElementById('q-total').textContent  = QUESTIONS.length;
  document.getElementById('progress-bar').style.width = ((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('question-word').textContent = q.word;
  document.getElementById('result-msg').textContent    = '';

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  q.choices.forEach((c, i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = ()=> pickAnswer(i, btn);
    grid.appendChild(btn);
  });

  // Timer
  clearInterval(timerInt);
  timerSec = 15;
  const badge = document.getElementById('timer-badge');
  const val   = document.getElementById('timer-val');
  badge.className = 'timer-badge';
  val.textContent = timerSec;
  qStartTime = Date.now();

  timerInt = setInterval(()=>{
    timerSec--;
    val.textContent = timerSec;
    if(timerSec <= 5) badge.className = 'timer-badge urgent';
    if(timerSec <= 0){
      clearInterval(timerInt);
      if(!answered) timeOut();
    }
  }, 1000);
}

// ===== PICK ANSWER =====
function pickAnswer(idx, btn){
  if(answered) return;
  answered = true;
  clearInterval(timerInt);

  const q       = QUESTIONS[currentQ];
  const elapsed = Date.now() - qStartTime;
  totalMs      += elapsed;

  const allBtns = document.querySelectorAll('.choice');
  allBtns.forEach(b=>b.classList.add('disabled'));

  if(idx === q.correct){
    score++;
    btn.classList.add('correct');
    document.getElementById('result-msg').textContent = '✅ صح!';
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    document.getElementById('result-msg').textContent = '❌ غلط!';
  }

  setTimeout(nextQuestion, 900);
}

function timeOut(){
  answered = true;
  totalMs += 15000;
  const q = QUESTIONS[currentQ];
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.correct) b.classList.add('correct');
  });
  document.getElementById('result-msg').textContent = '⏰ انتهى الوقت!';
  setTimeout(nextQuestion, 900);
}

function nextQuestion(){
  currentQ++;
  if(currentQ < QUESTIONS.length){
    renderQuestion();
  } else {
    finishQuiz();
  }
}

// ===== FINISH =====
async function finishQuiz(){
  showScreen('loading');
  const totalSec = (totalMs / 1000).toFixed(1);
  try{
    await sb.from('adeeb_results').insert({
      player_name:  playerName,
      session_code: sessionCode,
      score:        score,
      total:        QUESTIONS.length,
      total_ms:     totalMs,
    });
  } catch(e){ console.error(e); }
  await loadLeaderboard();
}

// ===== LEADERBOARD =====
async function loadLeaderboard(){
  try{
    const {data,error} = await sb.from('adeeb_results')
      .select('player_name,score,total_ms')
      .eq('session_code', sessionCode)
      .order('score',{ascending:false})
      .order('total_ms',{ascending:true})
      .limit(50);
    if(error) throw error;
    renderLeaderboard(data||[]);
  } catch(e){
    console.error(e);
    renderLeaderboard([]);
  }
  showScreen('lb');
}

const RANK_ICONS = ['👑','🥈','🥉','4','5'];

function renderLeaderboard(rows){
  const container = document.getElementById('lb-list');
  if(rows.length===0){
    container.innerHTML='<div style="text-align:center;color:rgba(27,47,78,0.45);padding:24px;">لا توجد نتائج بعد</div>';
    return;
  }

  const thead = `<table class="lb-table">
    <thead><tr>
      <th>المركز</th>
      <th style="text-align:right">الاسم</th>
      <th>النتيجة</th>
      <th>الوقت</th>
    </tr></thead>
    <tbody id="lb-tbody"></tbody>
  </table>`;

  container.innerHTML = `<div style="border-radius:12px;overflow:hidden;border:1px solid var(--glass-border);">${thead}</div>`;

  // show session code in subtitle
  document.querySelector('.lb-sub').textContent = `: ${sessionCode} — الترتيب بالإعتماد على النتيجة والسرعة`;

  const tbody = document.getElementById('lb-tbody');
  rows.forEach((r, i)=>{
    const isMe      = r.player_name === playerName;
    const totalSecs = (r.total_ms / 1000).toFixed(1);
    const rankIcon  = i < 3
      ? `<span class="rank-badge rank-${i+1}">${RANK_ICONS[i]}</span>`
      : `<span class="rank-badge">${i+1}</span>`;
    // row highlighting: me overrides top color
    let rowClass = i===0?'row-top1':i===1?'row-top2':i===2?'row-top3':'';
    if(isMe) rowClass += ' row-me';

    const tr = document.createElement('tr');
    tr.className = rowClass;
    tr.innerHTML = `
      <td>${rankIcon}</td>
      <td style="font-weight:${isMe?'900':'700'}">${esc(r.player_name)}</td>
      <td>${r.score}<span style="color:rgba(27,47,78,0.4);font-size:12px;">/37</span></td>
      <td>${totalSecs}ث</td>`;
    tbody.appendChild(tr);
  });

  // confetti للاعب الأول إذا كان هو اللاعب الحالي
  if(rows[0]?.player_name === playerName){
    confetti({particleCount:180,spread:80,origin:{y:0.6},colors:['#c9a84c','#e8c97a','#fff']});
  }
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function playAgain(){ location.reload(); }
</script>
